	<style>

    .grid {
      /*рисуем зелёные рамки*/
      border: 5px solid #915A00;
			border-radius: 15px;
			background-color: #DE931B;
      /*подключаем сетку*/
      display: grid;

			grid-template-rows: 428px;
			grid-column-gap: 10px;
			/* overflow: hidden; */
		}

    /*внешний вид ячеек*/
    .grid > * {
      /*фоновый цвет*/
       /*скругление углов*/
      border-radius: 5px;
			vertical-align: top
      /*отступ от содержимого до края ячейки*/
      padding: 7px;
      /*расстояние от одной границы ячейки до другой*/
      margin: 1px;

    }

	    /* position: absolute; */
	    transform: translate(-50%, -50%);
	    color: white;
	    /* top: 50%; */

	  }

  </style>
</head>
